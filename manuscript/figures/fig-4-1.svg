<svg xmlns="http://www.w3.org/2000/svg" width="920" height="340" viewBox="0 0 920 340" role="img" aria-labelledby="title desc">
  <title id="title">図 4-1 ソースは材料、DOM は組み立て結果</title>
  <desc id="desc">html・head・body を書いていないソースから、ブラウザが解釈して html/head/body を補完した DOM の木を組み立てる流れを示す図。</desc>
  <rect width="920" height="340" fill="#ffffff"/>
  <style>
    .head { font: 600 19px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
    .cap  { font: 600 15px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #334155; }
    .code { font: 500 14px ui-monospace, Menlo, Consolas, monospace; fill: #1f2937; }
    .node { font: 600 14px ui-monospace, Menlo, Consolas, monospace; fill: #0369a1; }
    .added{ font: 600 12px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #b45309; }
    .arrow{ stroke: #0284c7; stroke-width: 2.5; fill: none; }
    .tline{ stroke: #94a3b8; stroke-width: 1.5; }
  </style>
  <text x="40" y="40" class="head">図 4-1　ソースは材料。ブラウザが補って文書の木を組み立てる。</text>

  <!-- source -->
  <text x="40" y="80" class="cap">あなたが書いたソース</text>
  <rect x="40" y="92" width="300" height="120" rx="12" fill="#f8fbfe" stroke="#cbd5e1" stroke-width="2"/>
  <text x="60" y="128" class="code">&lt;title&gt;sample&lt;/title&gt;</text>
  <text x="60" y="158" class="code">&lt;p&gt;Hello&lt;/p&gt;</text>
  <text x="60" y="190" class="added">※ html / head / body は書いていない</text>

  <!-- arrow -->
  <path d="M360 152 H440" class="arrow" marker-end="url(#ah)"/>
  <text x="400" y="140" class="cap" text-anchor="middle" fill="#0284c7">解釈・補完</text>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#0284c7"/>
    </marker>
  </defs>

  <!-- DOM tree -->
  <text x="470" y="80" class="cap">ブラウザが作った DOM</text>
  <rect x="470" y="92" width="410" height="220" rx="12" fill="#f8fbfe" stroke="#cbd5e1" stroke-width="2"/>
  <text x="640" y="124" class="node" text-anchor="middle">html</text>
  <line x1="640" y1="132" x2="560" y2="160" class="tline"/>
  <line x1="640" y1="132" x2="720" y2="160" class="tline"/>
  <text x="560" y="178" class="node" text-anchor="middle">head</text>
  <text x="720" y="178" class="node" text-anchor="middle">body</text>
  <line x1="560" y1="186" x2="560" y2="214" class="tline"/>
  <line x1="720" y1="186" x2="720" y2="214" class="tline"/>
  <text x="560" y="232" class="node" text-anchor="middle">title</text>
  <text x="720" y="232" class="node" text-anchor="middle">p</text>
  <line x1="560" y1="240" x2="560" y2="262" class="tline"/>
  <line x1="720" y1="240" x2="720" y2="262" class="tline"/>
  <text x="560" y="280" class="code" text-anchor="middle">"sample"</text>
  <text x="720" y="280" class="code" text-anchor="middle">"Hello"</text>
  <text x="675" y="150" class="added">html/head/body は補完された</text>
</svg>
