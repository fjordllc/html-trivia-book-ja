<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">図 21-1 HTML をめぐる歴史の流れ</title>
  <desc id="desc">1989 年の提案から、公開、img の登場と無償化、ブラウザ戦争、XHTML の挫折、HTML5、2019 年の標準一本化、現在の Living Standard までを並べた年表。</desc>
  <rect width="960" height="300" fill="#ffffff"/>
  <style>
    .head { font: 600 19px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
    .year { font: 700 15px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0369a1; }
    .ev   { font: 500 13px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #334155; }
    .line { stroke: #94a3b8; stroke-width: 2; }
    .dot  { fill: #0284c7; }
  </style>
  <text x="40" y="40" class="head">図 21-1　HTML は完成したのではなく、調整され続けてきた。</text>
  <rect x="40" y="64" width="880" height="196" rx="14" fill="#f8fbfe" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="80" y1="160" x2="880" y2="160" class="line"/>

  <circle cx="110" cy="160" r="7" class="dot"/>
  <text x="110" y="120" class="year" text-anchor="middle">1989</text>
  <text x="110" y="138" class="ev" text-anchor="middle">提案書</text>

  <circle cx="220" cy="160" r="7" class="dot"/>
  <text x="220" y="196" class="year" text-anchor="middle">1991</text>
  <text x="220" y="214" class="ev" text-anchor="middle">世界初サイト公開</text>

  <circle cx="340" cy="160" r="7" class="dot"/>
  <text x="340" y="120" class="year" text-anchor="middle">1993</text>
  <text x="340" y="138" class="ev" text-anchor="middle">img 登場 / 無償化</text>

  <circle cx="470" cy="160" r="7" class="dot"/>
  <text x="470" y="196" class="year" text-anchor="middle">1990s</text>
  <text x="470" y="214" class="ev" text-anchor="middle">ブラウザ戦争</text>

  <circle cx="590" cy="160" r="7" class="dot"/>
  <text x="590" y="120" class="year" text-anchor="middle">2000</text>
  <text x="590" y="138" class="ev" text-anchor="middle">XHTML（→挫折）</text>

  <circle cx="700" cy="160" r="7" class="dot"/>
  <text x="700" y="196" class="year" text-anchor="middle">2014</text>
  <text x="700" y="214" class="ev" text-anchor="middle">HTML5</text>

  <circle cx="810" cy="160" r="7" class="dot"/>
  <text x="810" y="120" class="year" text-anchor="middle">2019</text>
  <text x="810" y="138" class="ev" text-anchor="middle">標準を一本化</text>

  <circle cx="880" cy="160" r="7" class="dot"/>
  <text x="880" y="196" class="year" text-anchor="middle">now</text>
  <text x="880" y="214" class="ev" text-anchor="middle">Living Standard</text>
</svg>
