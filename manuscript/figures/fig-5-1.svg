<svg xmlns="http://www.w3.org/2000/svg" width="920" height="320" viewBox="0 0 920 320" role="img" aria-labelledby="title desc">
  <title id="title">図 5-1 tbody は書かなくても DOM に立ち上がる</title>
  <desc id="desc">tbody を書いていない表のソースから、ブラウザが table と tr のあいだに tbody を補完した DOM を組み立てる流れを示す図。</desc>
  <rect width="920" height="320" fill="#ffffff"/>
  <style>
    .head { font: 600 19px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #0f172a; }
    .cap  { font: 600 15px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #334155; }
    .code { font: 500 14px ui-monospace, Menlo, Consolas, monospace; fill: #1f2937; }
    .node { font: 600 14px ui-monospace, Menlo, Consolas, monospace; fill: #0369a1; }
    .added{ font: 600 12px "Hiragino Sans", "Yu Gothic", sans-serif; fill: #b45309; }
    .arrow{ stroke: #0284c7; stroke-width: 2.5; fill: none; }
    .tline{ stroke: #94a3b8; stroke-width: 1.5; }
  </style>
  <text x="40" y="40" class="head">図 5-1　本体行は tbody の中。書かなくてもブラウザが立ち上げる。</text>

  <text x="40" y="84" class="cap">ソース（tbody なし）</text>
  <rect x="40" y="96" width="300" height="120" rx="12" fill="#f8fbfe" stroke="#cbd5e1" stroke-width="2"/>
  <text x="60" y="130" class="code">&lt;table&gt;</text>
  <text x="76" y="156" class="code">&lt;tr&gt;&lt;td&gt;A&lt;/td&gt;&lt;/tr&gt;</text>
  <text x="60" y="182" class="code">&lt;/table&gt;</text>

  <path d="M360 156 H440" class="arrow" marker-end="url(#ah5)"/>
  <text x="400" y="144" class="cap" text-anchor="middle" fill="#0284c7">補完</text>
  <defs>
    <marker id="ah5" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#0284c7"/>
    </marker>
  </defs>

  <text x="470" y="84" class="cap">DOM</text>
  <rect x="470" y="96" width="410" height="200" rx="12" fill="#f8fbfe" stroke="#cbd5e1" stroke-width="2"/>
  <text x="500" y="128" class="node">table</text>
  <line x1="512" y1="136" x2="540" y2="160" class="tline"/>
  <rect x="540" y="146" width="150" height="26" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="552" y="164" class="node">tbody</text>
  <text x="700" y="164" class="added">← 補完された</text>
  <line x1="560" y1="172" x2="588" y2="196" class="tline"/>
  <text x="588" y="214" class="node">tr</text>
  <line x1="600" y1="222" x2="628" y2="246" class="tline"/>
  <text x="628" y="264" class="node">td</text>
  <line x1="650" y1="264" x2="690" y2="264" class="tline"/>
  <text x="700" y="268" class="code">"A"</text>
</svg>
